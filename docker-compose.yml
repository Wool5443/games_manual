services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REPO_URL: ${REPO_URL:-https://github.com/Wool5443/games_manual.git}
      APP_DIR: /srv/app
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - app_data:/srv/app
    command:
      - sh
      - -c
      - |
          set -eu
          if [ ! -d "$$APP_DIR/.git" ]; then
            rm -rf "$$APP_DIR"
            git clone "$$REPO_URL" "$$APP_DIR"
          else
            git -C "$$APP_DIR" fetch --all --prune
            git -C "$$APP_DIR" reset --hard origin/HEAD
          fi
          pip install --no-cache-dir -r "$$APP_DIR/requirements.txt"
          mkdir -p "$$APP_DIR/instance" "$$APP_DIR/uploads"
          exec python "$$APP_DIR/app.py"

volumes:
  app_data:
