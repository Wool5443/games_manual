services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - app_instance:/srv/app/instance
      - app_uploads:/srv/app/uploads
    command: python app.py

volumes:
  app_instance:
  app_uploads:
