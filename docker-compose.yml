services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REPO_URL: ${REPO_URL:-https://github.com/Wool5443/games_manual.git}
      APP_DIR: /srv/app
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - app_data:/srv/app
    command:
      - sh
      - -c
      - |
          set -eu
          mkdir -p "$$APP_DIR"
          if [ ! -d "$$APP_DIR/.git" ]; then
            find "$$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            git clone "$$REPO_URL" "$$APP_DIR"
          else
            git -C "$$APP_DIR" fetch --all --prune
            git -C "$$APP_DIR" reset --hard origin/HEAD
          fi
          pip install --no-cache-dir -r "$$APP_DIR/requirements.txt"
          mkdir -p "$$APP_DIR/instance" "$$APP_DIR/uploads"
          exec python -c "import os, sys; sys.path.insert(0, os.environ['APP_DIR']); from app import app, init_db; ctx = app.app_context(); ctx.push(); init_db(); ctx.pop(); app.run(host='0.0.0.0', port=int(os.environ.get('PORT', '5000')), debug=False)"

volumes:
  app_data:
