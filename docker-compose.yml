services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./docker_data/instance:/srv/app/instance:Z
      - ./docker_data/uploads:/srv/app/uploads:Z
    command: python /srv/app/app.py
